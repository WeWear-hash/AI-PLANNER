name: Daily Planner

on:
  schedule:
    - cron: "0 0 * * *" # 4:00 AM UAE time = 00:00 UTC
  workflow_dispatch:

jobs:
  run-planner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run planner
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TASKS_DB_ID: ${{ secrets.TASKS_DB_ID }}
          SCHEDULE_DB_ID: ${{ secrets.SCHEDULE_DB_ID }}
          DAILY_PLAN_DB_ID: ${{ secrets.DAILY_PLAN_DB_ID }}
          CITY: ${{ secrets.CITY }}
          COUNTRY: ${{ secrets.COUNTRY }}
          LOCAL_UTC_OFFSET_HOURS: ${{ secrets.LOCAL_UTC_OFFSET_HOURS }}
        run: python planner.py
